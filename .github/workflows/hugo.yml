# .github/workflows/hugo.yml
name: Deploy Hugo to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3   # ✅ 必须是 v3，不是 v4！
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build
        run: hugo --minify

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3   # ✅ 必须是 v3
        with:
          path: ./public

      - name: Deploy
        uses: actions/deploy-pages@v4   # ✅ v4 是有效的，但需确保前面步骤无错