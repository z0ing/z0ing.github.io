baseURL = 'https://z0ing.github.io/'
locale = 'zh-cn'
title = "Zou'Log"
theme = "PaperMod"

paginate = 10                                 # 首页每页显示文章数
enableRobotsTXT = true                        # 允许搜索引擎抓取

[params]
    # --- 首页展示 ---
  description = "Hi, this is ZouMing. I’m documenting my learning notes in this blog"          # SEO 描述 + 首页副标题

    # --- 文章页面 ---
  ShowReadingTime = true                      # 显示预计阅读时间
  ShowShareButtons = true                     # 显示分享按钮
  ShowPostNavLinks = true                     # 显示上一篇/下一篇导航
  ShowBreadCrumbs = true                      # 显示面包屑导航
  ShowCodeCopyButtons = true                  # 代码块显示复制按钮
  ShowToc = true                              # 显示文章目录(TOC)
  TocOpen = false                             # 目录默认折叠(true=展开)

[[menu.main]]
  identifier = "archives"
  name = "📦 归档"
  url = "/archives/"
  weight = 5

[[menu.main]]
  identifier = "tags"
  name = "🏷️ 标签"
  url = "/tags/"
  weight = 10

[[menu.main]]
  identifier = "about"
  name = "👤 关于"
  url = "/about/"
  weight = 15